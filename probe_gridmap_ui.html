<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Probe GridMap Builder</title>
  <style>
    body {font-family: "Segoe UI", sans-serif;background-color: #f4f6f8;margin: 0;padding: 2rem;}
    .container {max-width: 700px;margin: auto;background: white;padding: 2rem 2.5rem;border-radius: 12px;box-shadow: 0 0 20px rgba(0,0,0,0.06);}
    h2 {text-align: center;color: #333;}
    label {font-weight: 600;margin-top: 1rem;display: block;}
    input[type="file"],
    input[type="text"],
    select {width: 100%; height:42px; padding: 0.6rem;margin-top: 0.3rem;margin-bottom: 0rem;border: 1px solid #ccc;border-radius: 6px;font-size: 1rem; box-sizing: border-box;}
    button { width: auto; height:42px; background-color: #007bff;color: white;border: none;padding: 0.7rem 1.4rem;font-size: 1rem;border-radius: 6px;cursor: pointer;margin-top: 1rem;}
    button:hover {background-color: #0056b3;}
    .section {margin-top: 2rem;}
    hr {margin: 2rem 0;border: none;border-top: 1px solid #ddd;}
    .probe-box-wrapper {margin-top:6px;}
    .probe-box-label {font-size:12px;color:#666;margin-bottom:3px;}
    .probe-box {border:1px solid #ddd;border-radius:6px;background-color:#fafafa;padding:6px 8px;font-size:12px;color:#555;max-height:96px;           /* 超出就滚动 */overflow-y:auto;line-height:1.4;white-space:pre-wrap;      /* 按 \n 换行 */word-break:break-all;      /* 太长也强制换行 */}
  </style>
</head>

<body>
  <div class="container">
    <h2
      style=" text-align: center; font-size: 28px; font-weight: 700; background: linear-gradient(to right, #2c3e50, #3498db); background-clip: text; -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 20px; padding-bottom: 8px;">
      Probe GridMap Builder
    </h2>
    <div style="text-align: center; line-height: 1.5; font-size: 16px; margin-top: -25px; margin-bottom: 5px;">
      Developed by Dr. Sean's Team of Drug Design and Discovery
    </div>

    <!-- 上传 TRR 文件 -->
    <form id="trrForm">
      <label for="trr_file">Upload Trajectory File (.trr/.nc/.xtc):</label>
      <div style="display: flex; align-items: center; gap: 0.5rem;">
        <input type="file" id="trr_file" name="trr_file" accept=".trr, .nc, .xtc" required>
        <button type="button" id="upload_trr_btn" style="margin-top: 3px">Upload</button>
      </div>
    </form>

    <!-- 上传 PDB 文件 -->
    <form id="pdbForm">
      <label for="pdb_file">Upload Protein File (.pdb):</label>
      <div style="display: flex; align-items: center; gap: 0.5rem;">
        <input type="file" id="pdb_file" name="pdb_file" accept=".pdb" required>
        <button type="button" id="upload_pdb_btn" style="margin-top: 3px">Upload</button>
      </div>
    </form>

    <!-- 主运行表单 -->
    <form method="POST" action="/run-gridmap" enctype="multipart/form-data">
      <label>Select Protein File:</label>
      <select style="height: 32px;" name="pdb_filename" id="pdb_select" required>
        {% for f in pdb_files %}
        <option value="{{ f }}">{{ f }}</option>
        {% endfor %}
      </select>

      <label>Select Trajectory File:</label>
      <select style="height: 32px;" name="traj_filename" id="traj_select" required>
        {% for f in trr_files %}
        <option value="{{ f }}">{{ f }}</option>
        {% endfor %}
      </select>

      <label>Select Probe Atoms:</label>
      <select name="probe" style="height: 32px;">
        <option value="ACN@N,C1,C2,H1,H2,H3">Acetonitrile (ACN)</option>
        <option value="IPA@O,C1,C2,C3,H1,H2,H3,H4,H6,H7,H8">Isopropanol (IPA)</option>
        <option value="PHN@O,C1,C2,C3,C4,C5,C6,H1,H2,H3,H4,H5,H6">Phenol (PHN)</option>
        <option value="NMA@O,N,C1,C2,C3,H1,H2,H3,H4,H5,H6,H7">N-Methylacetamide (NMA)</option>
        <option value="PYR@N1,N2,C1,C2,C3,C4,H1,H2,H3,H4">Pyrimidine (PYR)</option>
        <option value="FMA@C,O,N,H1,H2">Formamide (FMA)</option>
        <option value="DMS@S,O,C1,C2,H1,H2,H3,H4,H5,H6">Dimethyl Sulfoxide (DMS)</option>
        <option value="MEH@O,C,H1,H2,H3">Methanol (MEH)</option>
        <option value="GUA@C,N1,N2,N3,H1,H2,H3,H4,H5,H6">Guanidinium (GUA)</option>
        <option value="ACE@C1,C2,O,O-,H1,H2,H3">Acetate (ACE)</option>
        <option value="BNZ@C1,C2,C3,C4,C5,C6,H1,H2,H3,H4,H5,H6">Benzene (BNZ)</option>
        <option value="TOL@C1,C2,C3,C4,C5,C6,C7,H1,H2,H3,H4,H5,H6,H7,H8,H9">Toluene (TOL)</option>
        <option value="IND@C1,C2,C3,C4,C5,C6,C7,C8,N1,H1,H2,H3,H4,H5,H6,H7">Indole (IND)</option>
        <option value="custom">Custom</option>
      </select>

      <div id="custom_block" style="display:none; margin-top:0.5rem;">
        <label>Custom Atoms (only if 'custom' selected):</label>
        <input type="text" name="custom_atoms" id="custom_atoms" placeholder="e.g. LIG@C1,C2,C3,C4,C5,C6,H1,H2,H3,H4,H5,H6">
      
        <div class="probe-box-wrapper">
          <div class="probe-box-label">
            Detected non-standard components:
          </div>
          <div id="probe_templates" class="probe-box"></div>
        </div>
      </div>

      <label>Grid Spacing (dx):</label>
      <input type="text" name="dx" value="0.5">

      <label>Normalize Frame Count:</label>
      <input type="text" name="normframe" value="1000">

      <label>Max Cutoff Distance:</label>
      <input type="text" name="max" value="0.35">

      <button type="submit">Run GridMap Builder</button>
    </form>
  </div>
  
  <script>
    // 根据当前选择的 PDB，向后端请求非标准残基模板，在 Custom 下方灰色显示
    function loadProbeTemplates() {
      const pdbSelect = document.getElementById('pdb_select');
      const infoDiv = document.getElementById('probe_templates');
      if (!pdbSelect || !infoDiv) return;

      const pdb = pdbSelect.value;
      if (!pdb) {
        infoDiv.textContent = '';
        return;
      }

      fetch('/probe-templates?pdb=' + encodeURIComponent(pdb))
        .then(resp => resp.json())
        .then(data => {
          if (data.status !== 'success' || !data.templates || data.templates.length === 0) {
            infoDiv.textContent = 'No non-standard residues detected for probes.';
            return;
          }
          // 每个模板一行，利用 .probe-box 的 pre-wrap 自动换行
          infoDiv.textContent = data.templates.join('\n');
        })
        .catch(err => {
          console.error('probe-templates error', err);
          infoDiv.textContent = 'Failed to load probe templates.';
        });
    }

    // 根据 Probe 下拉选择，决定是否显示 Custom 区块
    function updateCustomVisibility() {
      const probeSelect = document.querySelector('select[name="probe"]');
      const customBlock = document.getElementById('custom_block');
      if (!probeSelect || !customBlock) return;
      if (probeSelect.value === 'custom') {
        customBlock.style.display = 'block';
      } else {
        customBlock.style.display = 'none';
      }
    }

    // 上传 PDB 文件并刷新下拉框
    document.getElementById('upload_pdb_btn').addEventListener('click', function () {
      const fileInput = document.getElementById('pdb_file');
      const file = fileInput.files[0];
      if (!file) {
        alert("Please select a .pdb file");
        return;
      }

      const formData = new FormData();
      formData.append('pdb_file', file);

      const xhr = new XMLHttpRequest();
      xhr.open('POST', '/upload-pdb', true);
      xhr.onload = function () {
        if (xhr.status === 200) {
          const response = JSON.parse(xhr.responseText);
          if (response.status === "success") {
            const select = document.getElementById('pdb_select');
            select.innerHTML = "";
            response.pdb_files.forEach(f => {
              const option = document.createElement("option");
              option.value = f;
              option.textContent = f;
              select.appendChild(option);
            });
            select.value = file.name;
            loadProbeTemplates();
          }
        }
      };
      xhr.send(formData);
    });

    // 上传 TRR 文件并刷新下拉框
    document.getElementById('upload_trr_btn').addEventListener('click', function () {
      const fileInput = document.getElementById('trr_file');
      const file = fileInput.files[0];
      if (!file) {
        alert("Please select a .trr, .nc, or .xtc file");
        return;
      }

      const formData = new FormData();
      formData.append('trr_file', file);

      const xhr = new XMLHttpRequest();
      xhr.open('POST', '/upload-trr', true);
      xhr.onload = function () {
        if (xhr.status === 200) {
          const response = JSON.parse(xhr.responseText);
          if (response.status === "success") {
            const select = document.getElementById('traj_select');
            select.innerHTML = "";
            response.trr_files.forEach(f => {
              const option = document.createElement("option");
              option.value = f;
              option.textContent = f;
              select.appendChild(option);
            });
            select.value = file.name;
          }
        }
      };
      xhr.send(formData);
    });

    // 页面初次加载时，根据默认选中 PDB 刷新探针提示，并根据 Probe 类型控制 Custom 显示
    window.addEventListener('load', function () {
      loadProbeTemplates();
      updateCustomVisibility();
    });

    // 切换选择 PDB 时，刷新探针提示
    const pdbSelectEl = document.getElementById('pdb_select');
    if (pdbSelectEl) {
      pdbSelectEl.addEventListener('change', loadProbeTemplates);
    }

    // 切换 Probe 类型时，显示/隐藏 Custom 区域
    const probeSelectEl = document.querySelector('select[name="probe"]');
    if (probeSelectEl) {
      probeSelectEl.addEventListener('change', updateCustomVisibility);
    }
  </script>
</body>
</html>
